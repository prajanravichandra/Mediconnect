spring.application.name=mediconnect

# Database setup
spring.datasource.url=jdbc:mysql://localhost:3306/mediconnect_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA and Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Setup
mediconnect.app.jwtSecret=MediconnectSecretKeyForJwtAuthenticationWhichRequiresToHaveSufficientLengthSuchAs256bitsOrMore1234567890
mediconnect.app.jwtExpirationMs=86400000

# Mail setup for OTP (Use dummy config or prompt user to configure)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Google OAuth2 (Prompt user for credentials)
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=profile, email
